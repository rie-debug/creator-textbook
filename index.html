<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Textbook — Cre8Club</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f5f4f2;color:#1a1816;font-size:14px;min-height:100vh}
#app{min-height:100vh}
.app-shell{display:flex;flex-direction:column;min-height:100vh}

/* ── Header ── */
.top-header{background:#0d1b2a;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;position:sticky;top:0;z-index:200}
.header-left{display:flex;align-items:baseline;gap:8px;flex-shrink:0}
.logo{font-size:16px;font-weight:600;color:#fff;letter-spacing:-.3px;white-space:nowrap}
.logo span{color:#ff6b9d}
.logo-sub{font-size:10px;color:rgba(255,255,255,.4);font-family:'DM Mono',monospace}
.header-center{flex:1;display:flex;justify-content:center;min-width:0}
.header-right{display:flex;align-items:center;gap:8px;color:#fff;flex-shrink:0}
.user-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.mode-tabs{display:flex;gap:2px;background:rgba(255,255,255,.1);padding:3px;border-radius:8px}
.mode-tab{padding:6px 12px;font-size:13px;font-weight:500;border-radius:6px;border:none;background:none;color:rgba(255,255,255,.6);cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .12s}
.mode-tab.active{background:rgba(255,255,255,.2);color:#fff;font-weight:600}
.btn-ghost{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:18px;padding:4px;border-radius:6px;flex-shrink:0;line-height:1}
.btn-ghost:hover{color:#fff}
.save-badge{font-size:11px;color:#4ade80;display:flex;align-items:center;gap:3px;opacity:0;transition:opacity .3s;white-space:nowrap}
@media(max-width:520px){
  .logo-sub,.user-name{display:none}
  .mode-tab{padding:6px 8px;font-size:12px}
  .top-header{gap:4px}
}

/* ── Section Nav ── */
.sec-nav{background:#fff;border-bottom:1px solid #e8e5e0;display:flex;align-items:stretch;flex-shrink:0;position:relative;z-index:100}
.sec-nav-inner{display:flex;align-items:stretch;flex:1;overflow-x:auto;padding:0 4px;gap:2px}
.sec-nav-inner::-webkit-scrollbar{display:none}
.nav-group{position:relative}
.nav-group-btn{padding:0 16px;height:48px;font-size:15px;font-weight:600;border:none;background:none;color:#6b6560;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .12s;border-bottom:3px solid transparent}
.nav-group-btn:hover,.nav-group-btn.open{color:#E1306C;border-bottom-color:#E1306C}
.nav-group-btn .chevron{font-size:13px;transition:transform .2s}
.nav-group-btn.open .chevron{transform:rotate(180deg)}
.dropdown{display:none;position:absolute;top:calc(100% + 2px);left:0;background:#fff;border:1px solid #e8e5e0;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:300;min-width:220px;padding:6px}
.dropdown.open{display:block}
.drop-item{width:100%;text-align:left;padding:10px 14px;font-size:14px;border:none;background:none;color:#6b6560;cursor:pointer;display:flex;align-items:center;gap:10px;border-radius:8px;font-family:'DM Sans',sans-serif;transition:all .1s;white-space:nowrap}
.drop-item:hover{background:#fce8f0;color:#E1306C}
.drop-item:hover .drop-num{color:#E1306C}
.drop-item.active{background:#fce8f0;color:#E1306C;font-weight:600}
.drop-item.active .drop-num{color:#E1306C}
.drop-num{font-family:'DM Mono',monospace;font-size:11px;color:#a09a93;width:22px;flex-shrink:0}
.drop-dot{width:6px;height:6px;border-radius:50%;background:#0f9e7b;margin-left:auto;flex-shrink:0;display:none}
.drop-item.done .drop-dot{display:block}
.ig-nav-btn{padding:0 16px;height:48px;font-size:14px;font-weight:600;border:none;background:none;color:#6b6560;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .12s;border-bottom:3px solid transparent}
.ig-nav-btn:hover{color:#E1306C;border-bottom-color:#E1306C}
.ig-nav-btn.active{color:#E1306C;border-bottom-color:#E1306C;font-weight:600}
.nav-progress{padding:10px 14px;border-left:1px solid #e8e5e0;min-width:160px;display:flex;flex-direction:column;justify-content:center;flex-shrink:0}
@media(max-width:600px){.nav-progress{display:none}}

/* ── Section nav bottom (◀ ▶) ── */
.sec-footer-nav{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:8px}
.sfn-btn{padding:10px 20px;font-size:14px;font-weight:600;border-radius:10px;border:none;background:#0d1b2a;color:#fff;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;transition:all .12s}
.sfn-btn:hover{background:#1a3a5c}
.sfn-btn:disabled{opacity:.3;cursor:default}
.sfn-center{font-size:13px;color:#a09a93;font-family:'DM Mono',monospace}

/* ── Main content ── */
.main-content{flex:1;padding:16px;max-width:800px;width:100%;margin:0 auto}

/* ── Form card ── */
.form-card{background:#fff;border:1px solid #e8e5e0;border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sec-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid #e8e5e0}
.sec-num-circle{width:36px;height:36px;border-radius:50%;background:#E1306C;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;font-family:'DM Mono',monospace;flex-shrink:0}
.sec-title{font-size:16px;font-weight:600}
.sec-hint{font-size:12px;color:#6b6560;margin-top:3px;line-height:1.5}
.field{margin-bottom:14px}
.field-label{font-size:12px;font-weight:600;color:#6b6560;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.field-eg{font-size:10px;color:#a09a93;font-weight:400;background:#f5f4f2;padding:2px 6px;border-radius:4px}
.field input[type=text],.field textarea{width:100%;padding:9px 11px;font-size:14px;border-radius:8px;border:1px solid #d4cfc8;background:#f5f4f2;color:#1a1816;line-height:1.6;resize:vertical;font-family:'DM Sans',sans-serif;transition:border .12s}
.field input:focus,.field textarea:focus{outline:none;border-color:#E1306C;background:#fff;box-shadow:0 0 0 3px rgba(225,48,108,.08)}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:480px){.field-grid{grid-template-columns:1fr}}

/* Tables */
.table-wrap{overflow-x:auto;margin-bottom:8px;-webkit-overflow-scrolling:touch}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{padding:8px 10px;background:#f5f4f2;font-size:11px;font-weight:600;color:#6b6560;text-align:left;border-bottom:1px solid #e8e5e0;white-space:nowrap}
.data-table td{padding:4px 6px;border-bottom:1px solid #e8e5e0}
.data-table input{width:100%;font-size:13px;padding:5px 7px;border:1px solid transparent;border-radius:5px;background:transparent;color:#1a1816;font-family:'DM Sans',sans-serif}
.data-table input:focus{outline:none;border-color:#E1306C;background:#fff}
.add-row-btn{font-size:12px;color:#E1306C;background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:3px;padding:6px;border-radius:6px;margin-top:4px}
.add-row-btn:hover{background:#fce8f0}
.badge-pink{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;background:#fce8f0;color:#E1306C;font-family:'DM Mono',monospace}
.text-muted{color:#a09a93}

/* Checklist */
.checklist{display:flex;flex-direction:column;gap:6px}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid #e8e5e0;cursor:pointer;transition:all .12s;font-size:14px}
.check-item:hover{background:#f5f4f2}
.check-item.checked{background:#e6f7f2;border-color:#a0ddd0}
.check-item input[type=checkbox]{accent-color:#0f9e7b;width:16px;height:16px;flex-shrink:0}
.check-item span{flex:1;line-height:1.4}
.check-mark{font-size:12px;color:#0f9e7b;font-weight:600}

/* Icon upload */
.icon-upload-wrap{display:flex;align-items:center;gap:16px}
.icon-preview{width:80px;height:80px;border-radius:50%;border:2px solid #d4cfc8;background:#f5f4f2;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.icon-preview img{width:100%;height:100%;object-fit:cover}
.upload-label{padding:10px 16px;font-size:13px;border-radius:8px;border:1px dashed #d4cfc8;background:none;color:#6b6560;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .12s}
.upload-label:hover{border-color:#E1306C;color:#E1306C;background:#fce8f0}

/* Concept */
.src-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.src-box{background:#f5f4f2;border-radius:8px;padding:12px}
.src-label{font-size:10px;font-weight:700;color:#a09a93;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.src-text{font-size:13px;line-height:1.6;color:#6b6560}
.alert-warn{background:#fff8e8;border:1px solid #f5d76e;border-radius:8px;padding:10px 12px;font-size:12px;color:#8a6d1a;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.alert-ok{background:#e6f7f2;border:1px solid #a0ddd0;border-radius:8px;padding:10px 12px;font-size:13px;font-weight:600;color:#0f6e56;display:flex;align-items:center;gap:6px;margin-top:8px}
.btn-approve{padding:10px 20px;font-size:13px;font-weight:600;border-radius:8px;border:none;background:#E1306C;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px}
.btn-approve:hover{background:#b91c57}
.btn-ghost-sm{padding:10px 14px;font-size:13px;border-radius:8px;border:1px solid #d4cfc8;background:none;color:#6b6560;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px}
@media(max-width:480px){.src-grid{grid-template-columns:1fr}}

/* IG Profile */
.ig-wrap{max-width:440px;margin:0 auto}
.ig-card{background:#fff;border:1px solid #e8e5e0;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ig-top{padding:18px 16px 12px}
.ig-row{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.ig-avatar{width:80px;height:80px;border-radius:50%;padding:2px;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);flex-shrink:0}
.ig-av-inner{width:100%;height:100%;border-radius:50%;background:#f5f4f2;overflow:hidden;border:2px solid #fff;display:flex;align-items:center;justify-content:center}
.ig-av-inner img{width:100%;height:100%;object-fit:cover}
.ig-stats{display:flex;gap:16px;flex:1;justify-content:center}
.ig-stat{text-align:center}
.ig-stat-n{font-size:16px;font-weight:700;display:block}
.ig-stat-l{font-size:11px;color:#6b6560}
.ig-username{font-size:14px;font-weight:700;margin-bottom:2px}
.ig-name{font-size:13px;color:#6b6560;margin-bottom:8px}
.ig-bio{font-size:13px;line-height:1.65;white-space:pre-wrap;margin-bottom:10px}
.ig-tag{background:#f5f4f2;border-radius:6px;padding:8px 10px;font-size:12px;line-height:1.6;margin-bottom:6px}
.ig-tag-label{font-size:10px;font-weight:700;color:#a09a93;letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px}
.ig-actions{padding:0 16px 12px;display:flex;gap:6px}
.ig-btn{flex:1;padding:7px;font-size:13px;font-weight:600;border-radius:8px;border:1px solid #d4cfc8;background:none;color:#1a1816;text-align:center}
.ig-btn-follow{background:#E1306C;color:#fff;border-color:#E1306C}
.ig-divider{height:1px;background:#e8e5e0}
.ig-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#e8e5e0}
.ig-cell{aspect-ratio:1;overflow:hidden}
.ig-cell img{width:100%;height:100%;object-fit:cover;display:block}

/* Admin */
.admin-header{margin-bottom:16px}
.admin-title{font-size:17px;font-weight:600;margin-bottom:4px}
.admin-sub{font-size:13px;color:#6b6560}
.admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.admin-card{background:#fff;border:1px solid #e8e5e0;border-radius:14px;padding:14px;cursor:pointer;transition:all .15s}
.admin-card:hover{border-color:#E1306C;transform:translateY(-1px);box-shadow:0 4px 16px rgba(225,48,108,.1)}
.admin-card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.admin-av{width:40px;height:40px;border-radius:50%;background:#f5f4f2;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:#6b6560}
.admin-av img{width:100%;height:100%;object-fit:cover}
.admin-name{font-size:13px;font-weight:600}
.admin-email{font-size:11px;color:#a09a93}
.admin-prog{height:4px;background:#f5f4f2;border-radius:2px;overflow:hidden;margin-top:8px}
.admin-fill{height:100%;background:#E1306C;border-radius:2px}
.admin-pct{font-size:11px;color:#a09a93;margin-top:4px}

/* ── Present Mode ── */
.present-shell{position:fixed;inset:0;background:#0d1b2a;z-index:1000;display:flex;flex-direction:column;overflow:hidden}
.present-topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.1);flex-shrink:0}
.present-user{display:flex;align-items:center;gap:10px}
.present-user img{width:32px;height:32px;border-radius:50%;object-fit:cover}
.present-user-name{font-size:14px;font-weight:600;color:#fff}
.present-title{font-size:13px;color:rgba(255,255,255,.5);font-family:'DM Mono',monospace}
.present-actions{display:flex;align-items:center;gap:8px}
.present-btn{padding:7px 14px;font-size:13px;font-weight:600;border-radius:8px;border:none;background:rgba(255,255,255,.12);color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px;transition:all .12s}
.present-btn:hover{background:rgba(255,255,255,.2)}
.present-btn.exit{background:#E1306C}
.present-btn.exit:hover{background:#b91c57}
.present-content{flex:1;overflow-y:auto;padding:24px 20px;display:flex;align-items:flex-start;justify-content:center}
.present-content::-webkit-scrollbar{width:4px}
.present-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}
.present-bottom{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(255,255,255,.05);border-top:1px solid rgba(255,255,255,.1);flex-shrink:0;gap:12px}
.present-nav-btn{padding:12px 24px;font-size:15px;font-weight:600;border-radius:10px;border:none;background:#fff;color:#0d1b2a;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;transition:all .12s}
.present-nav-btn:hover:not(:disabled){background:#fce8f0;color:#E1306C}
.present-nav-btn:disabled{opacity:.3;cursor:default}
.present-counter{font-size:13px;color:rgba(255,255,255,.5);font-family:'DM Mono',monospace;text-align:center}
.present-sec-label{font-size:15px;font-weight:600;color:#fff;text-align:center}

/* Present slide card */
.slide-card{background:#fff;border-radius:20px;padding:32px;width:100%;max-width:680px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.slide-num{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;background:#E1306C;color:#fff;font-size:13px;font-weight:700;font-family:'DM Mono',monospace;margin-bottom:16px}
.slide-title{font-size:22px;font-weight:700;margin-bottom:20px;color:#1a1816}
.slide-row{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #f0ece8}
.slide-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.slide-label{font-size:11px;font-weight:700;color:#a09a93;letter-spacing:.6px;text-transform:uppercase;margin-bottom:5px}
.slide-value{font-size:16px;color:#1a1816;line-height:1.6;white-space:pre-wrap;font-weight:500}
.slide-value.empty{color:#d4cfc8;font-style:italic;font-weight:400;font-size:14px}
.slide-tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:600;background:#fce8f0;color:#E1306C;margin-right:6px;margin-bottom:6px}
.slide-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.slide-box{background:#f8f6f3;border-radius:10px;padding:14px}
.slide-check-list{display:flex;flex-direction:column;gap:6px}
.slide-check-item{display:flex;align-items:center;gap:8px;font-size:14px;color:#1a1816}
.slide-check-item.done{color:#0f9e7b}
.slide-check-item i{font-size:16px;flex-shrink:0}
.slide-kgi-table{width:100%;border-collapse:collapse;font-size:14px}
.slide-kgi-table th{padding:8px 12px;background:#f8f6f3;font-size:11px;font-weight:700;color:#a09a93;letter-spacing:.4px;text-transform:uppercase;text-align:left;border-bottom:1px solid #e8e5e0}
.slide-kgi-table td{padding:10px 12px;border-bottom:1px solid #f0ece8;vertical-align:top}
.slide-kgi-table td:first-child{font-size:11px;font-weight:700;color:#a09a93;white-space:nowrap}
.slide-rival-item{padding:10px 14px;background:#f8f6f3;border-radius:8px;margin-bottom:6px}
.slide-rival-name{font-size:14px;font-weight:600;margin-bottom:3px}
.slide-rival-detail{font-size:12px;color:#6b6560}
.slide-ig-wrap{max-width:320px;margin:0 auto}
@media(max-width:480px){.slide-grid{grid-template-columns:1fr}.slide-card{padding:20px}.slide-title{font-size:18px}}

/* Empty */
.empty-state{text-align:center;padding:60px 20px;color:#a09a93}
.empty-state i{font-size:48px;margin-bottom:12px;display:block}
.empty-state p{font-size:14px}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0d1b2a">
    <div style="color:rgba(255,255,255,.5);font-size:14px;display:flex;align-items:center;gap:10px">
      <i class="ti ti-loader" style="animation:spin 1s linear infinite;font-size:20px"></i> 読み込み中…
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBYT9INQHIeVmVUbB6-0Qt98w1mnJRz7oA",
  authDomain: "cre8club.firebaseapp.com",
  projectId: "cre8club",
  storageBucket: "cre8club.firebasestorage.app",
  messagingSenderId: "1047210088180",
  appId: "1:1047210088180:web:70b85b3702c7db88da30a1"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── State ──
let currentUser = null;
let userData = {};
let allUsers = [];
let mode = 'user';
let currentSec = 's01';
let presentIdx = 0;
let saveTimer = null;

const SECTIONS_BASIC = [
  {id:'s01',num:'01',label:'KGI / KPI 設定',fields:['purpose_text','purpose_num','kgi_text','kgi_num','kpi1_text','kpi1_num','kpi3_text','kpi3_num','kpi6_text','kpi6_num']},
  {id:'s02',num:'02',label:'自分の強み分析',fields:['strengths_list','strengths_summary']},
  {id:'s03',num:'03',label:'インスタニーズマップ',fields:['needs']},
  {id:'s04',num:'04',label:'自分の強み × ニーズ',fields:['cross']},
  {id:'s05',num:'05',label:'ペルソナ設定',fields:['persona_gender','persona_age','persona_area','persona_job','persona_income','persona_married','persona_kids','persona_hobby','persona_worry','persona_summary']},
  {id:'s06',num:'06',label:'仮コンセプト設計',fields:['concept_draft']},

// ── Firestore helpers ──
function gf(f){ return userData[f]||''; }
function sf(f,v){ userData[f]=v; scheduleSave(); renderNavState(); renderProgress(); }
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{ await setDoc(doc(db,'users',currentUser.uid),userData,{merge:true}); showSaved(); }catch(e){ console.error(e); }
  },800);
}
function showSaved(){ const el=document.getElementById('save-badge'); if(el){el.style.opacity='1';setTimeout(()=>{if(el)el.style.opacity='0';},2000);} }
function getCheck(s,i){ try{return(userData[`chk_${s}`]||{})[i]||false;}catch(e){return false;} }
function setCheck(s,i,v){ const k=`chk_${s}`; if(!userData[k])userData[k]={}; userData[k][i]=v; scheduleSave(); }
function calcPct(d){
  const total=ALL_SECTIONS.reduce((n,s)=>n+(s.fields?s.fields.length:0),0);
  const filled=ALL_SECTIONS.reduce((n,s)=>{ if(!s.fields)return n; return n+s.fields.filter(f=>(d||userData)[f]).length; },0);
  return {total,filled,pct:total?Math.round(filled/total*100):0};
}

// ── Helpers ──
function card(num,title,hint,content){
  const allS=ALL_WITH_IG;
  const idx=allS.findIndex(s=>s.id===currentSec);
  const prev=idx>0?allS[idx-1]:null;
  const next=idx<allS.length-1?allS[idx+1]:null;
  return `<div class="form-card">
    <div class="sec-header">
      <div class="sec-num-circle">${num}</div>
      <div><div class="sec-title">${title}</div>${hint?`<div class="sec-hint">${hint}</div>`:''}</div>
    </div>
    ${content}
    <div class="sec-footer-nav">
      <button class="sfn-btn" id="sfn-prev" ${!prev?'disabled':''}><i class="ti ti-chevron-left"></i> 前へ</button>
      <span class="sfn-center">${idx+1} / ${allS.length}</span>
      <button class="sfn-btn" id="sfn-next" ${!next?'disabled':''}>次へ <i class="ti ti-chevron-right"></i></button>
    </div>
  </div>`;
}

function attachFooterNav(){
  const prev=document.getElementById('sfn-prev');
  const next=document.getElementById('sfn-next');
  const allS=ALL_WITH_IG;
  const idx=allS.findIndex(s=>s.id===currentSec);
  if(prev&&!prev.disabled) prev.addEventListener('click',()=>{ currentSec=allS[idx-1].id; renderApp(); });
  if(next&&!next.disabled) next.addEventListener('click',()=>{ currentSec=allS[idx+1].id; renderApp(); });
}

function renderCheck(area,sid,num,title,checks,candF,finalF,finalLabel,isTA=false){
  const cand=isTA?`<textarea id="f-cand" rows="4" placeholder="候補を入力">${gf(candF)}</textarea>`:`<input type="text" id="f-cand" value="${gf(candF)}" placeholder="候補を入力">`;
  const fin=isTA?`<textarea id="f-fin" rows="4" placeholder="確定版を入力">${gf(finalF)}</textarea>`:`<input type="text" id="f-fin" value="${gf(finalF)}" placeholder="確定版を入力">`;
  area.innerHTML=card(num,title,'',`
    <div class="field"><div class="field-label">候補</div>${cand}</div>
    <div class="field"><div class="field-label">チェックリスト</div>
    <div class="checklist">${checks.map((c,i)=>{const chk=getCheck(sid,i);return`<label class="check-item${chk?' checked':''}" id="chk-${sid}-${i}"><input type="checkbox"${chk?' checked':''} data-sec="${sid}" data-idx="${i}"><span>${c}</span>${chk?'<span class="check-mark">✓</span>':''}</label>`;}).join('')}</div></div>
    <div class="field"><div class="field-label" style="color:#E1306C">✦ ${finalLabel}</div>${fin}</div>`);
  document.getElementById('f-cand').addEventListener('input',e=>sf(candF,e.target.value));
  document.getElementById('f-fin').addEventListener('input',e=>sf(finalF,e.target.value));
  document.querySelectorAll(`[data-sec="${sid}"]`).forEach(cb=>{
    cb.addEventListener('change',()=>{
      const i=+cb.dataset.idx; const v=cb.checked; setCheck(sid,i,v);
      const lbl=document.getElementById(`chk-${sid}-${i}`);
      if(lbl){ lbl.classList.toggle('checked',v); const m=lbl.querySelector('.check-mark'); if(v&&!m)lbl.insertAdjacentHTML('beforeend','<span class="check-mark">✓</span>'); else if(!v&&m)m.remove(); }
    });
  });
  attachFooterNav();
}

  document.querySelectorAll('.admin-card').forEach(card=>{

function renderPresentMode(){
  const area=document.getElementById('main-content');
  // 発表モードはfixedで全画面表示
  const shell=document.createElement('div');
  shell.className='present-shell';
  shell.id='present-shell';
  const sec=ALL_WITH_IG[presentIdx];
  shell.innerHTML=`
    <div class="present-topbar">
      <div class="present-user">
        <img src="${currentUser.photoURL||''}" alt="">
        <div>
          <div class="present-user-name">${currentUser.displayName||''}</div>
          <div class="present-title">Creator Textbook — Cre8Club</div>
        </div>
      </div>
      <div class="present-actions">
        <button class="present-btn" id="p-fullscreen"><i class="ti ti-maximize"></i> 全画面</button>
        <button class="present-btn exit" id="p-exit"><i class="ti ti-x"></i> 終了</button>
      </div>
    </div>
    <div class="present-content" id="present-content"></div>
    <div class="present-bottom">
      <button class="present-nav-btn" id="p-prev" ${presentIdx===0?'disabled':''}><i class="ti ti-chevron-left"></i> 前へ</button>
      <div style="text-align:center">
        <div class="present-sec-label">${sec.num}. ${sec.label}</div>
        <div class="present-counter">${presentIdx+1} / ${ALL_WITH_IG.length}</div>
      </div>
      <button class="present-nav-btn" id="p-next" ${presentIdx===ALL_WITH_IG.length-1?'disabled':''}>次へ <i class="ti ti-chevron-right"></i></button>
    </div>`;
  document.body.appendChild(shell);

  document.getElementById('p-exit').addEventListener('click',()=>{ shell.remove(); mode='user'; renderApp(); });
  document.getElementById('p-fullscreen').addEventListener('click',()=>{
    if(!document.fullscreenElement) shell.requestFullscreen().catch(()=>{});
    else document.exitFullscreen();
  });
  document.getElementById('p-prev').addEventListener('click',()=>{ if(presentIdx>0){ presentIdx--; shell.remove(); renderPresentMode(); } });
  document.getElementById('p-next').addEventListener('click',()=>{ if(presentIdx<ALL_WITH_IG.length-1){ presentIdx++; shell.remove(); renderPresentMode(); } });

  renderSlide(document.getElementById('present-content'), sec);
}

function renderSlide(container, sec){
  container.innerHTML=`<div class="slide-card">${buildSlide(sec)}</div>`;
}

function buildSlide(sec){
  const v=(f,fallback='')=>{ const val=gf(f); return val||fallback; };
  const empty=(t)=>`<span class="slide-value empty">${t}</span>`;
  const val=(f,fb)=>{ const vl=gf(f); return vl?`<div class="slide-value">${vl}</div>`:empty(fb); };

  switch(sec.id){
    case 's01':{
      const rows=[{k:'purpose',l:'運用目的'},{k:'kgi',l:'KGI 半年目標'},{k:'kpi1',l:'KPI 1か月目'},{k:'kpi3',l:'KPI 3か月目'},{k:'kpi6',l:'KPI 6か月目'}];
      return `<div class="slide-num">01</div><div class="slide-title">KGI / KPI 設定</div>
        <table class="slide-kgi-table">
          <thead><tr><th>項目</th><th>概要・気持ち目標</th><th>数値目標</th></tr></thead>
          <tbody>${rows.map(r=>`<tr>
            <td>${r.l}</td>
            <td>${gf(r.k+'_text')||'<span style="color:#d4cfc8;font-style:italic">未入力</span>'}</td>
            <td>${gf(r.k+'_num')||'<span style="color:#d4cfc8">—</span>'}</td>
          </tr>`).join('')}</tbody>
        </table>`;
    }
    case 's02': return `<div class="slide-num">02</div><div class="slide-title">自分の強み分析</div>
      <div class="slide-row"><div class="slide-label">強みリスト</div>${val('strengths_list','未入力')}</div>
      <div class="slide-row"><div class="slide-label">強みまとめ</div>${val('strengths_summary','未入力')}</div>`;
    case 's03': return `<div class="slide-num">03</div><div class="slide-title">インスタニーズマップ</div>
      <div class="slide-row">${val('needs','未入力')}</div>`;
    case 's04': return `<div class="slide-num">04</div><div class="slide-title">自分の強み × ニーズ</div>
      <div class="slide-row">${val('cross','未入力')}</div>`;
    case 's05':{
      const flds=[['persona_gender','性別'],['persona_age','年齢'],['persona_area','地域'],['persona_job','仕事'],['persona_income','年収'],['persona_married','既婚・未婚'],['persona_hobby','趣味'],['persona_worry','悩み']];
      return `<div class="slide-num">05</div><div class="slide-title">ペルソナ設定</div>
        <div class="slide-grid">${flds.map(([k,l])=>`<div class="slide-box"><div class="slide-label">${l}</div><div class="slide-value" style="font-size:15px">${gf(k)||'<span style="color:#d4cfc8">—</span>'}</div></div>`).join('')}</div>

    }

        <div style="text-align:center;margin:20px 0">
          <div style="width:100px;height:100px;border-radius:50%;margin:0 auto;overflow:hidden;background:#f5f4f2;border:3px solid #e8e5e0;display:flex;align-items:center;justify-content:center">
            ${icon?`<img src="${icon}" style="width:100%;height:100%;object-fit:cover">`:'<i class="ti ti-user" style="font-size:36px;color:#a09a93"></i>'}
          </div>
        </div>`;
    }
    case 'a4': return `<div class="slide-num">A4</div><div class="slide-title">プロフィール設計</div>
      <div class="slide-row"><div class="slide-label">候補</div>${val('profile_candidate','未入力')}</div>
      <div class="slide-row"><div class="slide-label">確定プロフィール</div>${val('profile_final','未確定')}</div>`;
    case 'a5': return `<div class="slide-num">A5</div><div class="slide-title">投稿・リール設計</div>
      <div class="slide-row">${val('reel_concept','未入力')}</div>`;
    case 'ig':{
      const icon=gf('icon'); const name=gf('accname_final')||currentUser.displayName||'アカウント名';
      const username=gf('username_final')||'username'; const bio=gf('profile_final')||'プロフィールを入力してください';
      const concept=gf('concept_final'); const persona=gf('persona_summary');
      return `<div class="slide-num" style="background:linear-gradient(135deg,#f09433,#dc2743,#bc1888)">★</div>
        <div class="slide-title">Your Account Information</div>
        <div class="slide-ig-wrap">
          <div class="ig-card">
            <div class="ig-top">
              <div class="ig-row">
                <div class="ig-avatar"><div class="ig-av-inner">${icon?`<img src="${icon}" alt="">`:'<i class="ti ti-user" style="font-size:24px;color:#a09a93"></i>'}</div></div>
                <div class="ig-stats"><div class="ig-stat"><span class="ig-stat-n">0</span><span class="ig-stat-l">投稿</span></div><div class="ig-stat"><span class="ig-stat-n">0</span><span class="ig-stat-l">フォロワー</span></div><div class="ig-stat"><span class="ig-stat-n">0</span><span class="ig-stat-l">フォロー中</span></div></div>
              </div>
              <div class="ig-username">@${username}</div>
              <div class="ig-name">${name}</div>
              <div class="ig-bio">${bio}</div>
              ${concept?`<div class="ig-tag"><div class="ig-tag-label">コンセプト</div>${concept}</div>`:''}
              ${persona?`<div class="ig-tag"><div class="ig-tag-label">ターゲット</div>${persona}</div>`:''}
            </div>
            <div class="ig-actions"><div class="ig-btn ig-btn-follow">フォローする</div><div class="ig-btn">メッセージ</div></div>
          </div>
        </div>`;
    }
    default: return `<div class="slide-value empty">このセクションのデータはありません</div>`;
  }
}
</script>
</body>
</html>
