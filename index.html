// ── Auth ──
window.loginWithGoogle = async () => {
  const provider = new GoogleAuthProvider();
  try { await signInWithPopup(auth, provider); } catch(e) { console.error(e); }
};
window.logout = async () => {
  await signOut(auth);
  currentUser = null; userData = {}; allUsers = [];
  renderLogin();
};

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    viewingUid = user.uid;
    await loadUserData(user.uid);
    await checkAdmin(user.uid);
    await loadAllUsers();
    renderApp();
  } else {
    renderLogin();
  }
});

// ── Firestore ──
async function loadUserData(uid) {
  const snap = await getDoc(doc(db, 'users', uid));
  if (snap.exists()) userData = snap.data();
  else {
    userData = { name: currentUser.displayName, email: currentUser.email, photoURL: currentUser.photoURL };
    await saveUserData(uid);
  }
}

async function saveUserData(uid) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await setDoc(doc(db, 'users', uid), userData, { merge: true });
      showSaved();
    } catch(e) { console.error('Save error:', e); }
  }, 800);
}

async function checkAdmin(uid) {
  try {
    const snap = await getDoc(doc(db, 'admins', uid));
    isAdmin = snap.exists();
  } catch(e) { isAdmin = false; }
}

async function loadAllUsers() {
  try {
    const snap = await getDocs(collection(db, 'users'));
    allUsers = [];
    snap.forEach(d => allUsers.push({ uid: d.id, ...d.data() }));
  } catch(e) { allUsers = []; }
}

function gf(field, uid) {
  const d = uid && uid !== currentUser?.uid ? {} : userData;
  return d[field] || '';
}
function sf(field, val) {
  userData[field] = val;
  saveUserData(currentUser.uid);
  renderNav();
  renderProgress();
}

function showSaved() {
  const el = document.getElementById('save-indicator');
  if (!el) return;
  el.style.opacity = '1';
  setTimeout(() => { if(el) el.style.opacity = '0'; }, 2000);
}

// ── Render helpers ──
function getField(field) { return userData[field] || ''; }
function getCheckState(secId, idx) {
  try { return (userData[`chk_${secId}`] || {})[idx] || false; } catch(e) { return false; }
}
function setCheckState(secId, idx, val) {
  const key = `chk_${secId}`;
  if (!userData[key]) userData[key] = {};
  userData[key][idx] = val;
  saveUserData(currentUser.uid);
}

function calcProgress() {
  const total = ALL_SECTIONS.reduce((n,s) => n + (s.fields ? s.fields.length : 0), 0);
  const filled = ALL_SECTIONS.reduce((n,s) => {
    if (!s.fields) return n;
    return n + s.fields.filter(f => getField(f)).length;
  }, 0);
  return { total, filled, pct: total ? Math.round(filled/total*100) : 0 };
}

function calcProgressForUser(data) {
  const total = ALL_SECTIONS.reduce((n,s) => n + (s.fields ? s.fields.length : 0), 0);
  const filled = ALL_SECTIONS.reduce((n,s) => {
    if (!s.fields) return n;
    return n + s.fields.filter(f => data[f]).length;
  }, 0);
  return { total, filled, pct: total ? Math.round(filled/total*100) : 0 };
}

// ── Main app ──
function renderApp() {

            <div class="nav-group-items" id="applied-items">
              ${SECTIONS_APPLIED.map(s => {
                const done = s.fields && s.fields.some(f => getField(f));
                return `<button class="nav-item ${s.id===currentSec?'active':''} ${done?'done':''}" onclick="goSec('${s.id}')">
                  <span class="nav-num">${s.num}</span><span>${s.label}</span>
                  ${done?'<span class="nav-done-dot"></span>':''}

              }).join('')}
            </div>
          </div>
          <button class="nav-item ${currentSec==='ig'?'active':''}" onclick="goSec('ig')" style="margin:4px 8px;border-radius:8px">

            <span>入力進捗</span><span>${pct}%（${filled}/${total}）</span>
          </div>
          <div style="height:4px;background:#e8e5e0;border-radius:2px;overflow:hidden">
            <div style="height:100%;background:#E1306C;border-radius:2px;width:${pct}%;transition:width .4s"></div>

  renderContent();
}

function renderNav() {
  if (mode !== 'user') return;
  const nav = document.getElementById('sec-nav');
  if (!nav) return;
  // 進捗だけ更新
  renderProgress();
  // navアイテムのactive/done更新
  document.querySelectorAll('.nav-item').forEach(btn => {
    const secId = btn.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
    if (!secId) return;
    btn.classList.toggle('active', secId === currentSec);
    const sec = ALL_SECTIONS.find(s => s.id === secId);
    if (sec) btn.classList.toggle('done', sec.fields && sec.fields.some(f => getField(f)));
  });
}

function renderProgress() {
  const { pct, filled, total } = calcProgress();
  const pctEl = document.querySelector('.nav-progress');
  if (pctEl) {
    pctEl.innerHTML = `
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#6b6560;margin-bottom:5px">
        <span>入力進捗</span><span>${pct}%（${filled}/${total}）</span>
      </div>
      <div style="height:4px;background:#e8e5e0;border-radius:2px;overflow:hidden">
        <div style="height:100%;background:#E1306C;border-radius:2px;width:${pct}%;transition:width .4s"></div>
      </div>`;
  }
}

window.toggleGroup = (id) => {
  const items = document.getElementById(`${id}-items`);
  const chevron = document.getElementById(`${id}-chevron`);
  if (!items) return;
  const isOpen = items.classList.contains('open');
  items.classList.toggle('open', !isOpen);
  if (chevron) chevron.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
};

// ドロップダウン外クリックで閉じる
document.addEventListener('click', (e) => {
  if (!e.target.closest('.nav-group')) {
    document.querySelectorAll('.nav-group-items').forEach(el => el.classList.remove('open'));
    document.querySelectorAll('.nav-group-items + .ti-chevron-down, [id$="-chevron"]').forEach(el => el.style.transform = 'rotate(0deg)');
  }
});

window.setMode = (m) => {
  mode = m;
  if (m === 'present') presentIdx = 0;
  renderApp();
};

window.goSec = (id) => {
  currentSec = id;
  renderNav();
  renderContent();
};

function renderContent() {
  const area = document.getElementById('main-content');
  if (!area) return;
  if (mode === 'admin') { renderAdmin(area); return; }
  if (mode === 'present') { renderPresent(area); return; }
  switch(currentSec) {
    case 's01': renderKGI(area); break;
    case 's02': renderStrengths(area); break;
    case 's03': renderTextSec(area,'s03','03','インスタニーズマップ','インスタユーザーが求めているものを書き出しましょう','needs','・行った気になれる体験\n・絶景・穴場スポット情報\n・真似できる編集テクニック\n・旅行計画のヒント'); break;
    case 's04': renderTextSec(area,'s04','04','自分の強み × ニーズ','強みとニーズを掛け合わせてポジションを見つけましょう','cross','例）大阪在住 × 関西穴場情報ニーズ → 関西特化の絶景スポット紹介'); break;
    case 's05': renderPersona(area); break;
    case 's06': renderTextSec(area,'s06','06','仮コンセプト設計','強み × ニーズ × ペルソナを一文にまとめましょう','concept_draft','例）週末だけ旅する20代女性のために、関西の映える穴場スポットをショート動画で届けるクリエイター'); break;
    case 's07': renderRivals(area); break;
    case 's08': renderTopPosts(area); break;
    case 's09': renderTheme(area); break;
    case 's10': renderConceptFinal(area); break;
    case 'a1': renderCheckSec(area,'a1','A1','ユーザーネーム設定',['ジャンルのキーワードが入っているか','短くて覚えやすいか','他のアカウントと被っていないか','長く使い続けられるか'],'username_candidate','username_final','確定ユーザーネーム'); break;
    case 'a2': renderCheckSec(area,'a2','A2','アカウント名設定',['検索されうるキーワードが入っているか','名前も入っているか','キーワードと名前の順番が正しいか','GoogleのSEOを意識できているか'],'accname_candidate','accname_final','確定アカウント名'); break;
    case 'a3': renderIconSec(area); break;
    case 'a4': renderCheckSec(area,'a4','A4','プロフィール設計',['箇条書きになっているか','投稿しているジャンルが明記されているか','中学生でも分かりやすいか','フォローするメリットが伝わるか','このアカウントの説明になっているか'],'profile_candidate','profile_final','確定プロフィール',true); break;
    case 'a5': renderReelSec(area); break;
    case 'ig': renderIG(area); break;
  }

    <button class="add-row-btn" onclick="addRivalRow()"><i class="ti ti-plus"></i> 行を追加</button>`);
}
function rivalRow(r,i){return `<tr><td><input value="${r.name||''}" placeholder="@account" oninput="saveRival(${i},'name',this.value)"></td><td><input value="${r.url||''}" placeholder="https://..." oninput="saveRival(${i},'url',this.value)"></td><td><input value="${r.followers||''}" placeholder="1.2万" oninput="saveRival(${i},'followers',this.value)"></td><td><input value="${r.strength||''}" placeholder="特徴" oninput="saveRival(${i},'strength',this.value)"></td></tr>`;}

window.saveRival=(i,k,v)=>{let r=[];try{r=JSON.parse(getField('rivals')||'[]');}catch(e){}if(!r[i])r[i]={};r[i][k]=v;sf('rivals',JSON.stringify(r));};

window.addPostRow=()=>{let p=[];try{p=JSON.parse(getField('top_posts')||'[]');}catch(e){}p.push({});sf('top_posts',JSON.stringify(p));const b=document.getElementById('posts-body');if(b)b.insertAdjacentHTML('beforeend',postRow({},p.length-1));};
window.savePost=(i,k,v)=>{let p=[];try{p=JSON.parse(getField('top_posts')||'[]');}catch(e){}if(!p[i])p[i]={};p[i][k]=v;sf('top_posts',JSON.stringify(p));};

function renderTheme(area) {
  const qs=[['theme_gap','競合の空白ポジションは？','例：奈良特化の絶景動画クリエイターがいない'],['theme_trend','伸びる投稿の傾向は？','例：日本の音楽に合わせた没入感ある絶景リール'],['theme_continue','自分が続けられそうなテーマは？','例：関西の絶景スポット紹介'],['theme_enjoy','自分が楽しめるテーマは？','例：旅行・撮影・動画編集'],['theme','あなたの独自テーマ（まとめ）','例：奈良特化の「思わず行きたくなる」絶景スポット紹介']];

window.approveConcept=()=>{sf('concept_ok','1');renderContent();};
window.resetApproval=()=>{sf('concept_ok','');renderContent();};

function renderCheckSec(area,secId,num,title,checks,candidateF,finalF,finalLabel,isTA=false) {
  const cand=isTA?`<textarea rows="4" placeholder="候補を入力" oninput="sf('${candidateF}',this.value)">${getField(candidateF)}</textarea>`:`<input type="text" value="${getField(candidateF)}" placeholder="候補を入力" oninput="sf('${candidateF}',this.value)">`;
  const final=isTA?`<textarea rows="4" placeholder="確定版を入力" oninput="sf('${finalF}',this.value)">${getField(finalF)}</textarea>`:`<input type="text" value="${getField(finalF)}" placeholder="確定版を入力" oninput="sf('${finalF}',this.value)">`;
  area.innerHTML = card(num,title,'',`
    <div class="field"><div class="field-label">候補</div>${cand}</div>
    <div class="field"><div class="field-label">チェックリスト</div>
    <div class="checklist">${checks.map((c,i)=>{const chk=getCheckState(secId,i);return`<label class="check-item${chk?' checked':''}"><input type="checkbox"${chk?' checked':''} onchange="toggleCheck('${secId}',${i},this.checked,this.closest('.check-item'))"><span>${c}</span>${chk?'<span class="check-mark">✓</span>':''}</label>`;}).join('')}</div></div>
    <div class="field"><div class="field-label" style="color:#E1306C">✦ ${finalLabel}</div>${final}</div>`);
}
window.toggleCheck=(sec,i,v,el)=>{setCheckState(sec,i,v);el.classList.toggle('checked',v);const m=el.querySelector('.check-mark');if(v&&!m)el.insertAdjacentHTML('beforeend','<span class="check-mark">✓</span>');else if(!v&&m)m.remove();};

function renderIconSec(area) {
  const icon=getField('icon');
  const checks=['アイコンを見てどんな投稿か分かるか','他に埋もれないデザインか','ターゲットにウケるデザインか','投稿内容に合う世界観か'];
  area.innerHTML = card('A3','アイコン設定','プロフィールの第一印象を決める大切な要素です',`
    <div class="field">
      <div class="icon-upload-wrap">
        <div class="icon-preview">${icon?`<img src="${icon}" alt="icon">`:'<i class="ti ti-user" style="font-size:28px;color:#a09a93"></i>'}</div>
        <div>
          <label class="upload-label" for="icon-file"><i class="ti ti-upload"></i> 画像をアップロード</label>
          <input type="file" id="icon-file" accept="image/*" onchange="uploadIcon(this)" style="display:none">
          <p style="font-size:11px;color:#a09a93;margin-top:6px">JPG・PNG対応（2MB以下推奨）</p>
          ${icon?`<button onclick="sf('icon','')" style="margin-top:6px;font-size:11px;color:#a09a93;background:none;border:none;cursor:pointer"><i class="ti ti-trash"></i> 削除</button>`:''}
        </div>
      </div>
    </div>
    <div class="field"><div class="field-label">チェックリスト</div>
    <div class="checklist">${checks.map((c,i)=>{const chk=getCheckState('a3',i);return`<label class="check-item${chk?' checked':''}"><input type="checkbox"${chk?' checked':''} onchange="toggleCheck('a3',${i},this.checked,this.closest('.check-item'))"><span>${c}</span>${chk?'<span class="check-mark">✓</span>':''}</label>`;}).join('')}</div></div>`);
}
window.uploadIcon=(input)=>{
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{sf('icon',e.target.result);renderContent();};
  reader.readAsDataURL(file);
};

function renderReelSec(area) {
  const checks=['冒頭1秒で引き込む構成になっているか','音源と映像がマッチしているか','ペルソナの悩みを解決できるコンテンツか','保存されやすい情報が入っているか','最後に明確なアクション誘導があるか'];
  area.innerHTML = card('A5','投稿・リール設計','チェックリストで投稿のクオリティを確認しましょう',`
    <div class="field"><div class="field-label">投稿コンセプト・アイデア</div>
    <textarea rows="5" placeholder="どんな投稿をするか記入してください" oninput="sf('reel_concept',this.value)">${getField('reel_concept')}</textarea></div>
    <div class="field"><div class="field-label">チェックリスト</div>
    <div class="checklist">${checks.map((c,i)=>{const chk=getCheckState('a5',i);return`<label class="check-item${chk?' checked':''}"><input type="checkbox"${chk?' checked':''} onchange="toggleCheck('a5',${i},this.checked,this.closest('.check-item'))"><span>${c}</span>${chk?'<span class="check-mark">✓</span>':''}</label>`;}).join('')}</div></div>`);
}

function renderIG(area) {
  const icon=getField('icon');
  const name=getField('accname_final')||currentUser.displayName||'アカウント名';
  const username=getField('username_final')||'username';
  const bio=getField('profile_final')||'プロフィールを入力してください';
  const concept=getField('concept_final');
  const persona=getField('persona_summary');
  const igPhotos = [
    'https://images.unsplash.com/photo-1490806843957-31f4c9a91c65?w=300&q=80',
    'https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=300&q=80',
    'https://images.unsplash.com/photo-1504109586057-7a2ae83d1338?w=300&q=80',
    'https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=300&q=80',
    'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=300&q=80',
    'https://images.unsplash.com/photo-1526481280693-3bfa7568e0f3?w=300&q=80',
    'https://images.unsplash.com/photo-1545569341-9eb8b30979d9?w=300&q=80',
    'https://images.unsplash.com/photo-1516663713099-efd8cadb6e92?w=300&q=80',

  area.innerHTML = `<div class="ig-wrap">
    <div class="ig-card">

          <div class="ig-avatar"><div class="ig-av-inner">${icon?`<img src="${icon}" alt="icon">`:'<i class="ti ti-user" style="font-size:24px;color:#a09a93"></i>'}</div></div>
          <div class="ig-stats">
            <div class="ig-stat"><span class="ig-stat-n">0</span><span class="ig-stat-l">投稿</span></div>
            <div class="ig-stat"><span class="ig-stat-n">0</span><span class="ig-stat-l">フォロワー</span></div>

        <div class="ig-name">${name}</div>
        <div class="ig-bio">${bio}</div>
        ${concept?`<div class="ig-tag"><div class="ig-tag-label">コンセプト</div>${concept}</div>`:''}
        ${persona?`<div class="ig-tag"><div class="ig-tag-label">ターゲット</div>${persona}</div>`:''}
      </div>
      <div class="ig-actions">
        <div class="ig-btn ig-btn-follow">フォローする</div>
        <div class="ig-btn">メッセージ</div>
      </div>
      <div class="ig-divider"></div>
      <div class="ig-grid">${igPhotos.map(url=>`<div class="ig-cell"><img src="${url}" alt="post" loading="lazy"></div>`).join('')}</div>

// ── Admin ──
function renderAdmin(area) {
  if (!allUsers.length) {
    area.innerHTML = `<div class="empty-state"><i class="ti ti-users"></i><p>まだユーザーが登録されていません</p></div>`;
    return;
  }
  const cards = allUsers.map(u => {
    const {pct,filled,total} = calcProgressForUser(u);
    const av = u.photoURL ? `<img src="${u.photoURL}" alt="${u.name}">` : `<span>${(u.name||'?').charAt(0)}</span>`;
    return `<div class="admin-card" onclick="viewUserAdmin('${u.uid}')">
      <div class="admin-card-top"><div class="admin-av">${av}</div>
      <div><div class="admin-name">${u.name||u.email}</div><div class="admin-email">${u.email||''}</div></div></div>
      <div class="admin-prog"><div class="admin-fill" style="width:${pct}%"></div></div>
      <div class="admin-pct">${pct}% 完了（${filled}/${total}項目）</div>
    </div>`;
  }).join('');
  area.innerHTML = `
    <div class="admin-header"><div class="admin-title">管理者ビュー</div>
    <div class="admin-sub">ユーザーをクリックして入力内容を確認できます（${allUsers.length}人）</div></div>
    <div class="admin-grid">${cards}</div>`;
}

window.viewUserAdmin = async (uid) => {
  const snap = await getDoc(doc(db, 'users', uid));
  const data = snap.exists() ? snap.data() : {};
  userData = data;
  viewingUid = uid;
  currentSec = 'ig';
  mode = 'user';
  renderApp();
};

// ── Present ──
function renderPresent(area) {
  const allS = [...ALL_SECTIONS, SEC_IG];
  const sec = allS[presentIdx] || allS[0];
  area.innerHTML = `<div class="present-bar">
    <div class="present-label"><i class="ti ti-presentation"></i> 発表モード — ${currentUser.displayName}</div>
    <div class="present-nav">
      <button class="nav-btn" onclick="presNav(-1)" ${presentIdx===0?'disabled':''}><i class="ti ti-chevron-left"></i> 前へ</button>
      <span class="present-sec-name">${sec.num}. ${sec.label}</span>
      <span class="present-counter">${presentIdx+1} / ${allS.length}</span>
      <button class="nav-btn" onclick="presNav(1)" ${presentIdx===allS.length-1?'disabled':''}>次へ <i class="ti ti-chevron-right"></i></button>
    </div>
  </div>
  <div id="present-body" class="present-body"></div>`;
  renderPresentContent(sec.id);
}

function renderPresentContent(secId) {
  const body = document.getElementById('present-body');
  if (!body) return;
  // present-bodyを一時的にmain-contentとして使ってレンダリング
  const orig = document.getElementById('main-content');
  const tempArea = body;
  tempArea.innerHTML = '';
  currentSec = secId;
  // 各セクションのレンダラーを直接呼ぶ
  switch(secId) {
    case 's01': renderKGI(tempArea); break;
    case 's02': renderStrengths(tempArea); break;
    case 's03': renderTextSec(tempArea,'s03','03','インスタニーズマップ','インスタユーザーが求めているものを書き出しましょう','needs','・行った気になれる体験\n・絶景・穴場スポット情報\n・真似できる編集テクニック\n・旅行計画のヒント'); break;
    case 's04': renderTextSec(tempArea,'s04','04','自分の強み × ニーズ','強みとニーズを掛け合わせてポジションを見つけましょう','cross','例）大阪在住 × 関西穴場情報ニーズ → 関西特化の絶景スポット紹介'); break;
    case 's05': renderPersona(tempArea); break;
    case 's06': renderTextSec(tempArea,'s06','06','仮コンセプト設計','強み × ニーズ × ペルソナを一文にまとめましょう','concept_draft','例）週末だけ旅する20代女性のために、関西の映える穴場スポットをショート動画で届けるクリエイター'); break;
    case 's07': renderRivals(tempArea); break;
    case 's08': renderTopPosts(tempArea); break;
    case 's09': renderTheme(tempArea); break;
    case 's10': renderConceptFinal(tempArea); break;
    case 'a1': renderCheckSec(tempArea,'a1','A1','ユーザーネーム設定',['ジャンルのキーワードが入っているか','短くて覚えやすいか','他のアカウントと被っていないか','長く使い続けられるか'],'username_candidate','username_final','確定ユーザーネーム'); break;
    case 'a2': renderCheckSec(tempArea,'a2','A2','アカウント名設定',['検索されうるキーワードが入っているか','名前も入っているか','キーワードと名前の順番が正しいか','GoogleのSEOを意識できているか'],'accname_candidate','accname_final','確定アカウント名'); break;
    case 'a3': renderIconSec(tempArea); break;
    case 'a4': renderCheckSec(tempArea,'a4','A4','プロフィール設計',['箇条書きになっているか','投稿しているジャンルが明記されているか','中学生でも分かりやすいか','フォローするメリットが伝わるか','このアカウントの説明になっているか'],'profile_candidate','profile_final','確定プロフィール',true); break;
    case 'a5': renderReelSec(tempArea); break;
    case 'ig': renderIG(tempArea); break;
  }
}

window.presNav=(d)=>{
  const allS=[...ALL_SECTIONS,SEC_IG];
  presentIdx=Math.max(0,Math.min(allS.length-1,presentIdx+d));
  const area = document.getElementById('main-content');
  if(area) renderPresent(area);
};

window.sf = sf;
window.approveConcept = window.approveConcept;
</script>
<style>

.nav-group-btn:hover{color:#E1306C;background:#fce8f0}
.nav-group-btn:hover i{color:#E1306C}

/* Form card */
.form-card{background:#fff;border:1px solid #e8e5e0;border-radius:14px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sec-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #e8e5e0}
.sec-num-circle{width:36px;height:36px;border-radius:50%;background:#E1306C;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;font-family:'DM Mono',monospace;flex-shrink:0}
.sec-title{font-size:16px;font-weight:600}
.sec-hint{font-size:12px;color:#6b6560;margin-top:3px;line-height:1.5}
.field{margin-bottom:14px}
.field-label{font-size:12px;font-weight:600;color:#6b6560;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.field-eg{font-size:10px;color:#a09a93;font-weight:400;background:#f5f4f2;padding:2px 6px;border-radius:4px}
.field input[type=text],.field textarea{width:100%;padding:8px 10px;font-size:13px;border-radius:8px;border:1px solid #d4cfc8;background:#f5f4f2;color:#1a1816;line-height:1.6;resize:vertical;font-family:'DM Sans',sans-serif;transition:border .12s}
.field input:focus,.field textarea:focus{outline:none;border-color:#E1306C;background:#fff;box-shadow:0 0 0 3px rgba(225,48,108,.08)}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Tables */
.table-wrap{overflow-x:auto;margin-bottom:8px}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{padding:7px 10px;background:#f5f4f2;font-size:11px;font-weight:600;color:#6b6560;text-align:left;border-bottom:1px solid #e8e5e0;white-space:nowrap}
.data-table td{padding:4px 6px;border-bottom:1px solid #e8e5e0}
.data-table input{width:100%;font-size:12px;padding:4px 6px;border:1px solid transparent;border-radius:4px;background:transparent;color:#1a1816;font-family:'DM Sans',sans-serif}
.data-table input:focus{outline:none;border-color:#E1306C;background:#fff}
.add-row-btn{font-size:11px;color:#E1306C;background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:3px;padding:5px 6px;border-radius:4px;margin-top:4px}
.add-row-btn:hover{background:#fce8f0}
.badge-pink{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;background:#fce8f0;color:#E1306C;font-family:'DM Mono',monospace}
.text-sm{font-size:12px}.text-muted{color:#a09a93}

/* Checklist */
.checklist{display:flex;flex-direction:column;gap:6px}
.check-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;border:1px solid #e8e5e0;cursor:pointer;transition:all .12s;font-size:13px}
.check-item:hover{background:#f5f4f2}
.check-item.checked{background:#e6f7f2;border-color:#a0ddd0}
.check-item input[type=checkbox]{accent-color:#0f9e7b;width:15px;height:15px;flex-shrink:0}
.check-item span{flex:1;line-height:1.4}
.check-mark{font-size:11px;color:#0f9e7b;font-weight:600}

/* Icon upload */
.icon-upload-wrap{display:flex;align-items:center;gap:16px}
.icon-preview{width:80px;height:80px;border-radius:50%;border:2px solid #d4cfc8;background:#f5f4f2;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.icon-preview img{width:100%;height:100%;object-fit:cover}
.upload-label{padding:8px 14px;font-size:12px;border-radius:8px;border:1px dashed #d4cfc8;background:none;color:#6b6560;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .12s}
.upload-label:hover{border-color:#E1306C;color:#E1306C;background:#fce8f0}

/* Concept */
.src-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.src-box{background:#f5f4f2;border-radius:8px;padding:12px}
.src-label{font-size:10px;font-weight:700;color:#a09a93;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.src-text{font-size:13px;line-height:1.6;color:#6b6560}
.alert-warn{background:#fff8e8;border:1px solid #f5d76e;border-radius:8px;padding:10px 12px;font-size:12px;color:#8a6d1a;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.alert-ok{background:#e6f7f2;border:1px solid #a0ddd0;border-radius:8px;padding:10px 12px;font-size:13px;font-weight:600;color:#0f6e56;display:flex;align-items:center;gap:6px;margin-top:8px}
.btn-approve{padding:9px 18px;font-size:13px;font-weight:600;border-radius:8px;border:none;background:#E1306C;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px}
.btn-approve:hover{background:#b91c57}
.btn-ghost-sm{padding:9px 14px;font-size:12px;border-radius:8px;border:1px solid #d4cfc8;background:none;color:#6b6560;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px}
.btn-ghost-sm:hover{background:#f5f4f2}

/* IG Profile */
.ig-wrap{max-width:420px;margin:0 auto}
.ig-card{background:#fff;border:1px solid #e8e5e0;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ig-top{padding:18px 16px 12px}
.ig-row{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.ig-avatar{width:80px;height:80px;border-radius:50%;padding:2px;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);flex-shrink:0}
.ig-av-inner{width:100%;height:100%;border-radius:50%;background:#f5f4f2;overflow:hidden;border:2px solid #fff;display:flex;align-items:center;justify-content:center}
.ig-av-inner img{width:100%;height:100%;object-fit:cover}
.ig-stats{display:flex;gap:16px;flex:1;justify-content:center}
.ig-stat{text-align:center}
.ig-stat-n{font-size:16px;font-weight:700;display:block}
.ig-stat-l{font-size:11px;color:#6b6560}
.ig-username{font-size:14px;font-weight:700;margin-bottom:2px}
.ig-name{font-size:13px;color:#6b6560;margin-bottom:8px}
.ig-bio{font-size:13px;line-height:1.65;white-space:pre-wrap;margin-bottom:10px}
.ig-tag{background:#f5f4f2;border-radius:6px;padding:8px 10px;font-size:12px;line-height:1.6;margin-bottom:6px}
.ig-tag-label{font-size:10px;font-weight:700;color:#a09a93;letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px}
.ig-actions{padding:0 16px 12px;display:flex;gap:6px}
.ig-btn{flex:1;padding:7px;font-size:13px;font-weight:600;border-radius:8px;border:1px solid #d4cfc8;background:none;color:#1a1816;text-align:center}
.ig-btn-follow{background:#E1306C;color:#fff;border-color:#E1306C}
.ig-divider{height:1px;background:#e8e5e0}
.ig-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#e8e5e0}
.ig-cell{aspect-ratio:1;overflow:hidden}
.ig-cell img{width:100%;height:100%;object-fit:cover;display:block}

/* Admin */
.admin-header{margin-bottom:16px}
.admin-title{font-size:16px;font-weight:600;margin-bottom:4px}
.admin-sub{font-size:12px;color:#6b6560}
.admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.admin-card{background:#fff;border:1px solid #e8e5e0;border-radius:14px;padding:14px;cursor:pointer;transition:all .15s}
.admin-card:hover{border-color:#E1306C;transform:translateY(-1px);box-shadow:0 4px 16px rgba(225,48,108,.1)}
.admin-card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.admin-av{width:40px;height:40px;border-radius:50%;background:#f5f4f2;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:#6b6560}
.admin-av img{width:100%;height:100%;object-fit:cover}
.admin-name{font-size:13px;font-weight:600}
.admin-email{font-size:11px;color:#a09a93}
.admin-prog{height:3px;background:#f5f4f2;border-radius:2px;overflow:hidden;margin-top:8px}
.admin-fill{height:100%;background:#E1306C;border-radius:2px}
.admin-pct{font-size:10px;color:#a09a93;margin-top:4px}

/* Present */
.present-bar{background:#fff;border:1px solid #e8e5e0;border-radius:14px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.present-label{font-size:13px;font-weight:600;color:#E1306C;display:flex;align-items:center;gap:6px}
.present-nav{display:flex;align-items:center;gap:8px}
.present-sec-name{font-size:14px;font-weight:600}
.present-counter{font-size:11px;color:#a09a93;font-family:'DM Mono',monospace}
.present-body{width:100%}
.nav-btn{padding:6px 12px;font-size:12px;border-radius:8px;border:1px solid #d4cfc8;background:#fff;color:#1a1816;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px;transition:all .12s}
.nav-btn:hover:not(:disabled){border-color:#E1306C;color:#E1306C}
.nav-btn:disabled{opacity:.35;cursor:default}

/* Empty */
.empty-state{text-align:center;padding:60px 20px;color:#a09a93}
.empty-state i{font-size:48px;margin-bottom:12px;display:block}
.empty-state p{font-size:14px}
</style>
</head>

      <i class="ti ti-loader" style="animation:spin 1s linear infinite;font-size:20px"></i> 読み込み中…
